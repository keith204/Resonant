<!DOCTYPE html>
<html>
<head><title>Clearing cache...</title></head>
<body style="background:#0a0a0f;color:#e0e0e0;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;">
<div id="msg">Clearing service worker and caches...</div>
<script>
(async () => {
  const msg = document.getElementById('msg');
  // Unregister all service workers
  const regs = await navigator.serviceWorker.getRegistrations();
  for (const reg of regs) await reg.unregister();
  // Clear all caches
  const keys = await caches.keys();
  for (const key of keys) await caches.delete(key);
  msg.textContent = 'Done! Redirecting...';
  setTimeout(() => window.location.href = '/index.html', 500);
})();
</script>
</body>
</html>
