    <rect x="132" y="-145" width="12" height="145" rx="3" fill="url(#bp)"/>
    <rect x="154" y="-70" width="12" height="70" rx="3" fill="url(#bg)"/>
    <rect x="176" y="-42" width="12" height="42" rx="3" fill="url(#bg)"/>
    <rect x="198" y="-55" width="12" height="55" rx="3" fill="url(#bg)"/>
